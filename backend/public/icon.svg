<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0d0d12" rx="100"/>
  
  <!-- TV/Display Icon -->
  <g transform="translate(256, 256)">
    <!-- TV Screen -->
    <rect x="-160" y="-120" width="320" height="240" fill="#0ea5e9" rx="20" stroke="#22d3ee" stroke-width="8"/>
    
    <!-- Screen Content -->
    <rect x="-140" y="-100" width="280" height="180" fill="#0d0d12" rx="10"/>
    
    <!-- Signal Lines -->
    <g stroke="#0ea5e9" stroke-width="6" fill="none" stroke-linecap="round">
      <path d="M -80 -80 L -60 -60 L -40 -80 L -20 -60 L 0 -80 L 20 -60 L 40 -80"/>
      <path d="M -120 0 L -100 20 L -80 0 L -60 20 L -40 0 L -20 20 L 0 0"/>
      <path d="M -100 60 L -80 80 L -60 60 L -40 80 L -20 60"/>
    </g>
    
    <!-- TV Stand -->
    <rect x="-40" y="120" width="80" height="20" fill="#22d3ee" rx="10"/>
    <rect x="-60" y="140" width="120" height="15" fill="#0ea5e9" rx="8"/>
  </g>
  
  <!-- Text/Title (opcional) -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#0ea5e9" text-anchor="middle">IPTV</text>
</svg>


